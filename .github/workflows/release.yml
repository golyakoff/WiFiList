name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set - the APK would be unsigned and could not be installed."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Verify the APK is signed
        run: |
          set -e
          APK=$(ls app/build/outputs/apk/release/*.apk)
          echo "Built: $APK"
          case "$APK" in
            *unsigned*)
              echo "::error::$APK is unsigned - check the signing secrets."
              exit 1
              ;;
          esac
          APKSIGNER=$(ls "$ANDROID_HOME"/build-tools/*/apksigner | sort -V | tail -1)
          "$APKSIGNER" verify --print-certs "$APK"

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: WiFiList-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Re-running a tag must not fail on an existing release, so replace
          # the assets instead of trying to create the release a second time.
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME exists - updating its assets"
            gh release upload "$GITHUB_REF_NAME" \
              app/build/outputs/apk/release/*.apk --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              app/build/outputs/apk/release/*.apk \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi

      - name: Remove keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/release.jks"
